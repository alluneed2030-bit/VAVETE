<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vavete</title>

  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
    }

    /* Background image */
    .bg {
      background-image: url("https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&w=1600&q=80");
      height: 100vh;
      background-position: center;
      background-size: cover;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Dark overlay */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      background: rgba(0,0,0,0.55);
    }

    /* Content box */
    .content {
      position: relative;
      color: white;
      text-align: center;
      max-width: 600px;
      padding: 20px;
    }

    h1 {
      font-size: 50px;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    p {
      font-size: 18px;
      margin: 10px 0;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      border: none;
      background: #ffcc00;
      color: black;
      font-weight: bold;
      cursor: pointer;
      border-radius: 6px;
      text-decoration: none;
      display: inline-block;
    }

    .btn:hover {
      background: #ffdb4d;
    }

  </style>
</head>

<body>

  <div class="bg">
    <div class="overlay"></div>

    <div class="content">
      <h1>vavete</h1>

      <p>Your trip, your way — pick up here, drop off anywhere.</p>
      <p>Save time. Reduce idle cars. Increase revenue.</p>

      <p><b>Coming soon</b></p>

      <a class="btn" href="#">Join Waitlist</a>
    </div>
  </div>

</body>
</html>
